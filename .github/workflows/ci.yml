name: CI

# Green-bar gate: every push to main + every PR runs the full build (the 8
# auditors + tsc + vite) and the vitest suite. The app lives in cockpit/.
# No untrusted event input is used in any run: step (injection-safe).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cockpit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (verify:icons + 8 audits + tsc + vite)
        run: npm run build

      - name: Unit + snapshot tests
        run: npx vitest run
