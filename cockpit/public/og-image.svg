<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph card — 1200×630 (Facebook/X/LinkedIn standard).
  Visual matches the marketing site's above-the-fold:
    • Subtle dot grid background (same 22px pattern, faded down for legibility)
    • Eyebrow pill "Open Source · No Login · No Lock-In"
    • Bold headline "Design a UI kit in 60 seconds."
    • Subtitle on the kit benefits
    • Gradient CTA pill (blue → purple, same as the live site)
    • Brand mark top-left

  WhatsApp/iMessage don't render SVG og:images reliably — for those a PNG
  fallback (og-image.png) sits next to this file and is what's referenced
  in index.html's meta. Generate the PNG from this SVG with any converter
  (CloudConvert, Inkscape: `inkscape og-image.svg -w 1200 -o og-image.png`)
  or screenshot /og-card.html in a 1200×630 browser viewport.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Subtle dot pattern, fades into the page bg from the bottom. -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="rgba(0,0,0,0.12)" />
    </pattern>
    <linearGradient id="cta-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="50.96%" stop-color="#007BFF" />
      <stop offset="118.53%" stop-color="#570BA9" />
    </linearGradient>
    <linearGradient id="dot-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="55%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="fade-mask">
      <rect width="1200" height="630" fill="url(#dot-fade)" />
    </mask>
  </defs>

  <!-- Off-white canvas matching --mkt-bg -->
  <rect width="1200" height="630" fill="#ffffff" />
  <!-- Dot grid background, faded by mask -->
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#fade-mask)" />

  <!-- Brand mark top-left (logo.svg square + wordmark) -->
  <g transform="translate(56, 56)">
    <rect width="44" height="44" rx="9" fill="#151518" />
    <!-- "C" brandmark — same as /logo.svg, scaled into the 44px square -->
    <g transform="translate(8, 8) scale(0.875)">
      <path d="M31.1922 10.9804C29.9974 7.36421 27.5519 4.29282 24.2953 2.31831C21.0386 0.343808 17.1845 -0.404305 13.4257 0.208456C9.66685 0.821217 6.24986 2.75466 3.78894 5.66123C1.32803 8.56781 -0.0154078 12.2569 0.000133216 16.0653C0.0156742 19.8737 1.38917 23.5517 3.87373 26.4381C6.35828 29.3245 9.79094 31.23 13.5546 31.812C17.3183 32.3941 21.1662 31.6145 24.4066 29.6135C27.6471 27.6125 30.0674 24.5213 31.2327 20.8955L22.0778 17.9533C21.6129 19.4 20.6472 20.6334 19.3542 21.4318C18.0613 22.2302 16.526 22.5412 15.0243 22.309C13.5226 22.0767 12.153 21.3165 11.1616 20.1648C10.1703 19.0131 9.62227 17.5456 9.61607 16.0261C9.60987 14.5065 10.1459 13.0346 11.1278 11.8748C12.1097 10.7151 13.4731 9.94368 14.9728 9.69919C16.4726 9.4547 18.0104 9.7532 19.3098 10.541C20.6092 11.3288 21.585 12.5543 22.0617 13.9972L31.1922 10.9804Z" fill="white" />
    </g>
    <text x="60" y="29" fill="#0a0a0b" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="22" font-weight="600" letter-spacing="-0.01em">UIcockpit</text>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(600, 220)">
    <rect x="-156" y="-22" width="312" height="36" rx="18" fill="#ebf4ff" />
    <circle cx="-130" cy="-4" r="4" fill="#007aff" />
    <text x="-118" y="2" fill="#007aff" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="-0.005em">Open Source · No Login · No Lock-In</text>
  </g>

  <!-- Headline -->
  <text
    x="600"
    y="340"
    text-anchor="middle"
    fill="#0a0a0b"
    font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="600"
    letter-spacing="-0.035em"
  >
    Design a UI kit in 60 seconds.
  </text>

  <!-- Subtitle -->
  <text
    x="600"
    y="400"
    text-anchor="middle"
    fill="#6b6b73"
    font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="-0.005em"
  >
    Pick a brand, tweak the shape, dial in motion. Export tokens for any framework.
  </text>

  <!-- Gradient CTA pill -->
  <g transform="translate(600, 470)">
    <rect x="-115" y="-22" width="230" height="44" rx="22" fill="url(#cta-grad)" />
    <text x="0" y="4" text-anchor="middle" fill="white" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="17" font-weight="500" letter-spacing="-0.005em">Build my UI kit →</text>
  </g>

  <!-- Footer stat line -->
  <text
    x="600"
    y="570"
    text-anchor="middle"
    fill="#9a9aa1"
    font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
    font-size="14"
    font-weight="500"
    letter-spacing="0.04em"
  >
    120+ TOKENS · 40+ COMPONENTS · 16 WCAG CHECKS · 6 EXPORT FORMATS
  </text>
</svg>
