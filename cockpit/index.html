<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─────────── Primary SEO ─────────── -->
    <title>UIcockpit — The design system generator for AI-built apps</title>
    <meta
      name="description"
      content="Generate a design system — tokens + components — export it to Tailwind v4, shadcn/ui or any framework, and keep it consistent when AI builds. Free & open source."
    />
    <meta
      name="keywords"
      content="design system generator, design system, design tokens, ui kit configurator, tailwind v4, shadcn/ui, design tokens generator, ai design tools, cursor, v0, lovable, bolt, w3c design tokens, css variables, dark mode tokens, wcag audit"
    />
    <meta name="author" content="UIcockpit" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://uicockpit.com/" />

    <!-- ─────────── Icons & PWA ─────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="apple-mobile-web-app-title" content="UIcockpit" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ─────────── Open Graph (Facebook, WhatsApp, LinkedIn, iMessage) ───────────
         WhatsApp + iMessage prefer raster; we ship a PNG for them. Other
         platforms (X, LinkedIn, Discord, Slack) read either. -->

    <meta property="og:title" content="UIcockpit — The design system generator" />
    <meta

      content="Generate a design system — tokens + components — export it to Tailwind v4, shadcn/ui or any framework, and keep it consistent when AI builds. Free & open source."
    />

    <meta property="og:image" content="https://uicockpit.com/og-image.png" />

      property="og:image:alt"

    <!-- ─────────── Twitter / X Card ─────────── -->

    <meta name="twitter:title" content="UIcockpit — The design system generator" />
    <meta

      content="Generate a design system — tokens + components — export it to Tailwind v4, shadcn/ui or any framework, and keep it consistent when AI builds. Free & open source."

    <meta name="twitter:image:alt" content="UIcockpit — Ship AI apps that look designed, not generated. Free & open source, next to real kit components." />

    <!-- ─────────── JSON-LD structured data ───────────
         Used by both Google's rich-result rendering AND modern AI engines
         (ChatGPT search, Perplexity, Claude with web access). Telling them
         exactly what this is, who it's for, and the cost (free) lets them
         answer "what design system tool can I use?" with us in the citation. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "UIcockpit",
        "alternateName": "UIcockpit Design System Generator",
        "url": "https://uicockpit.com/",
        "applicationCategory": "DeveloperApplication",
        "applicationSubCategory": "Design Tool",
        "operatingSystem": "Web (any modern browser)",
        "browserRequirements": "Requires JavaScript. Works in Chrome, Firefox, Safari, Edge.",
        "description": "Browser-based design system generator (a visual configurator). Turn colour, typography, shape, motion and density into a complete framework-neutral design system — tokens + component recipes. Export to Tailwind v4, shadcn/ui, plain CSS or JSON, hand it to any AI coding tool, and a CLI verifier (uicockpit check) keeps AI-generated code on-system. Free and open source, no account.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        },
        "featureList": [
          "2 base Styles + 10 curated color themes, calibrated to popular interface colours",
          "19 visual configuration controls",
          "250+ exported design tokens",
          "100+ component recipes",
          "16-pair WCAG contrast audit",
          "Z-index stack, breakpoints, container widths",
          "Auto-derived chart palette (6 series)",
          "Component CSS recipes included",
          "Tailwind v4 @theme export",
          "shadcn/ui CSS variables export",
          "W3C Design Tokens Community Group JSON",
          "AI prompt for any AI coding tool",
          "5 icon libraries (Lucide, Iconoir, Phosphor regular/bold, Heroicons)",
          "Light + dark mode",
          "URL-hash save (no accounts)",
          "Anonymous, no telemetry"
        ],
        "creator": { "@type": "Organization", "name": "UIcockpit" },
        "isAccessibleForFree": true,
        "license": "https://opensource.org/license/mit"
      }
    </script>

    <!-- A second JSON-LD block as an FAQ — gives AI engines (ChatGPT/Perplexity/Claude)
         clean Q&A blocks to cite when users ask "how do I make a design system?" -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is UIcockpit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "UIcockpit is a free, open-source, browser-based tool that helps developers and designers build a complete design system (colors, typography, radii, motion, components) in under a minute. The output is framework-neutral design tokens that drop into Tailwind v4, shadcn/ui, or any project."
            }
          },
          {
            "@type": "Question",
            "name": "Who is UIcockpit for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Vibe-coders and product builders using AI coding tools. UIcockpit ships a behavior-shaping AI prompt that tells those tools how to use the design system — so generated components match the tokens automatically."
            }
          },
          {
            "@type": "Question",
            "name": "What formats does UIcockpit export?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Six formats: tokens.css (drop-in CSS variables), Tailwind v4 globals.css (@theme block), shadcn/ui CSS variables, design.md (human + AI handoff spec), AGENTS.md agent rules (.cursorrules / CLAUDE.md ready), and a machine-checkable contract.json for the uicockpit check verifier. A W3C tokens.json (Design Tokens Community Group format, Figma-compatible via Tokens Studio) is also available on request."
            }
          },
          {
            "@type": "Question",
            "name": "Does UIcockpit require an account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No accounts, no telemetry, no backend. Your configuration lives in the URL hash — share a kit by copying the link. Custom fonts uploaded via drag-and-drop stay in the browser session and are never uploaded anywhere."
            }
          },
          {
            "@type": "Question",
            "name": "Is the accessibility audit included?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Every kit is tested live against 16 WCAG contrast pairs (text on surfaces, button text on fills, status colors on tints, input borders, focus rings). The pass count is visible in the topbar; failures include remedy hints pointing at the config control that fixes them."
            }
          }
        ]
      }
    </script>

    <!-- ─────────── Google Fonts ───────────
         Split for mobile speed: the DEFAULT kit fonts (Inter + JetBrains Mono)
         load render-blocking so first paint is in the right typeface; the other
         15 FontPicker families load ASYNC (media=print flip on load) so they no
         longer block first render — they're only needed once the picker opens.
         A URL-hash kit using a non-default font gets a brief FOUT (display=swap),
         which is fine. This took ~103 KB of 3rd-party CSS off the critical path. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Newsreader:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Newsreader:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
