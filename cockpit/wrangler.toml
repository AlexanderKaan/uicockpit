# UICockpit — Live Kit CDN Worker (THE canonical worker config — dev AND prod).
# worker/index.ts serves two routes:
#   GET  /k/<hash>.css  → genCss(decode(hash)), the same pure pipeline the app's
#                         download export uses.
#   POST /vision        → sandbox screenshot → blocks + foundation + content (one
#                         Anthropic vision call; the key is a Worker SECRET, never here).
# Local dev:  from cockpit/, `npx wrangler dev`  → http://localhost:8787
#             (key in cockpit/.dev.vars, gitignored).
# Prod:       from cockpit/, `npx wrangler deploy`  → uicockpit-kit / kit.uicockpit.com.
#             Set the key once:  `npx wrangler secret put ANTHROPIC_API_KEY`.
name = "uicockpit-kit"
main = "worker/index.ts"
compatibility_date = "2026-06-05"

# Custom domain — kit.uicockpit.com → this Worker. On `wrangler deploy`,
# Cloudflare provisions the DNS record + SSL cert automatically (requires
# uicockpit.com to be an active zone in the account). The default
# *.workers.dev URL keeps working too (this is additive).
routes = [
  { pattern = "kit.uicockpit.com", custom_domain = true }
]

# No bindings yet — the stateless /k/<hash>.css lane needs no storage.
# The stateful live/pinned lanes (P2) add a KV namespace binding here.
